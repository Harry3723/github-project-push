name: Weekly GitHub Project Push

on:
  schedule:
    - cron: '0 1 * * 0'   # Sunday 01:00 UTC = Saturday 20:00 CDT (Texas)
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit history back to repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly push
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python main.py --force --print-report

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/push_history.json reports/latest_report.md
          git diff --staged --quiet || git commit -m "chore: weekly push $(date -u +%Y-%m-%d)"
          git push
